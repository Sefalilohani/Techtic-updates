name: Techtic Daily In-Progress Update

on:
  schedule:
    - cron: "30 2 * * *"   # 08:00 AM IST (UTC+5:30)
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

jobs:
  send-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

         - name: Debug token shape
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          echo "Token length: ${#SLACK_BOT_TOKEN}"
          echo "First 8 chars:   ${SLACK_BOT_TOKEN:0:8}"
          echo "Chars  8-16:     ${SLACK_BOT_TOKEN:8:8}"
          echo "Chars 16-24:     ${SLACK_BOT_TOKEN:16:8}"
          echo "Chars 24-32:     ${SLACK_BOT_TOKEN:24:8}"
          echo "Chars 32-40:     ${SLACK_BOT_TOKEN:32:8}"
          echo "Chars 40-48:     ${SLACK_BOT_TOKEN:40:8}"
          echo "Last 8 chars:    ${SLACK_BOT_TOKEN: -8}"
          echo "---"
          echo "Reconstructed prefix: xoxb${SLACK_BOT_TOKEN:4:27}"
          echo "Hardcoded suffix:     bFqMGfkmHBzvLRtU1It2ptnt"
          echo "Full reconstructed:   xoxb${SLACK_BOT_TOKEN:4:27}bFqMGfkmHBzvLRtU1It2ptnt"

      - name: Refresh Redash & send Slack update
        env:
          REDASH_API_KEY:  ${{ secrets.REDASH_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/send_techtic_update.py
